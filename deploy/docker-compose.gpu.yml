# docker-compose.gpu.yml — Argus detector service
#
# Deployment topology (D-17, two-host with mTLS from day one):
#   - This compose file runs on the GPU host (the machine running the Python detector).
#   - The orchestrator (edge host) connects to :50051 over LAN with mTLS.
#   - Certs are mounted read-only from ./certs/ (generated by deploy/generate-certs.sh).
#
# To start: docker compose -f deploy/docker-compose.gpu.yml up -d
# To stop:  docker compose -f deploy/docker-compose.gpu.yml down

services:
  detector:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.detector
    ports:
      - "50051:50051"
    volumes:
      # mTLS certificates — generated once, stored in deploy/certs/, never committed
      # (private keys are gitignored; generate with deploy/generate-certs.sh)
      - ./certs:/certs:ro
    environment:
      ARGUS_GRPC_PORT: "50051"
      ARGUS_LOG_LEVEL: "INFO"
      # TLS paths inside the container (matched to the volume mount above)
      ARGUS_TLS_CERT: /certs/server.crt
      ARGUS_TLS_KEY: /certs/server.key
      ARGUS_TLS_CA: /certs/ca.crt
    restart: unless-stopped
