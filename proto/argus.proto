syntax = "proto3";
package argus.v1;
option csharp_namespace = "Argus.Detector.V1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

message Point {
  string entity_id = 1;
  google.protobuf.DoubleValue value = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message Verdict {
  string entity_id = 1;
  google.protobuf.DoubleValue score = 2;
  google.protobuf.DoubleValue expected = 3;
  google.protobuf.DoubleValue lower = 4;
  google.protobuf.DoubleValue upper = 5;
  bool is_anomaly = 6;
  string detector = 7;
  google.protobuf.Timestamp timestamp = 8;
}

message FitRequest {
  string entity_id = 1;
  string detector = 2;
  map<string, string> params = 3;
  repeated Point window = 4;
}

message FitResponse {
  bool ok = 1;
  string error = 2;
}

message ScoreBatchRequest {
  string entity_id = 1;
  string detector = 2;
  map<string, string> params = 3;
  repeated Point window = 4;
}

message ScoreBatchResponse {
  repeated Verdict verdicts = 1;
  bool ok = 2;
  string error = 3;
}

message SaveModelRequest {
  string entity_id = 1;
  string detector = 2;
  int32 version = 3;
  bytes model_bytes = 4;
}

message SaveModelResponse {
  bool ok = 1;
  string error = 2;
}

message LoadModelRequest {
  string entity_id = 1;
  string detector = 2;
  int32 version = 3;
}

message LoadModelResponse {
  bool ok = 1;
  bytes model_bytes = 2;
  string error = 3;
}

service DetectorService {
  rpc ScoreStream(stream Point) returns (stream Verdict);
  rpc Fit(FitRequest) returns (FitResponse);
  rpc ScoreBatch(ScoreBatchRequest) returns (ScoreBatchResponse);
  rpc SaveModel(SaveModelRequest) returns (SaveModelResponse);
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
}
