name: Build and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    outputs:
      image_ref: ${{ steps.imgref.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish orchestrator
        run: >-
          dotnet publish orchestrator/Argus.Orchestrator/Argus.Orchestrator.csproj
          -c Release --self-contained false -o orchestrator/publish/

      - name: Assert wwwroot assets present in publish output
        shell: bash
        run: |
          test -f orchestrator/publish/wwwroot/js/htmx.min.js || {
            echo "FAIL: htmx.min.js not in publish output"
            exit 1
          }
          test -f orchestrator/publish/wwwroot/css/argus.css || {
            echo "FAIL: argus.css not in publish output"
            exit 1
          }
          echo "OK: wwwroot assets present in publish output"

      - name: Run unit tests
        run: dotnet test orchestrator/ -c Release --logger "console;verbosity=normal"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build timestamp
        id: builddate
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Compute image version (strip leading v from tag)
        id: ver
        env:
          REF: ${{ github.ref_name }}
        run: echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: argus/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argus:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/argus:latest
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}
            BUILD_DATE=${{ steps.builddate.outputs.date }}
            BUILD_REF=${{ github.sha }}
        timeout-minutes: 120

      - name: Export image ref
        id: imgref
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: echo "ref=ghcr.io/${OWNER}/argus:${VERSION}" >> "$GITHUB_OUTPUT"

  image-facts:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 30
    env:
      IMG: ${{ needs.build-and-push.outputs.image_ref }}

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gate — manifest contains amd64 and arm64
        shell: bash
        run: |
          docker buildx imagetools inspect --raw "$IMG" \
            | jq -e '(.manifests // error("not a manifest list"))
                     | map(.platform.architecture)
                     | (contains(["amd64"]) and contains(["arm64"])) or error("missing arch")'

      - name: Gate — torch-free on amd64 and arm64
        shell: bash
        run: |
          for plat in linux/amd64 linux/arm64; do
            if docker run --rm --platform "$plat" "$IMG" python3 -c "import torch" 2>/dev/null; then
              echo "FAIL: torch importable on $plat"
              exit 1
            fi
            echo "OK torch-free on $plat"
          done

      - name: Gate — compressed image size < 2 GB per arch
        shell: bash
        run: |
          # Enumerate per-arch manifest digests from the OCI index
          digests=$(docker buildx imagetools inspect --raw "$IMG" \
            | jq -r '.manifests[]
                     | select(.platform.os == "linux")
                     | select(.platform.architecture == "amd64" or .platform.architecture == "arm64")
                     | "\(.platform.architecture) \(.digest)"')

          while IFS=' ' read -r arch digest; do
            # Sum config.size + all layers[].size from the per-arch manifest
            total=$(docker buildx imagetools inspect --raw "${IMG%:*}@${digest}" \
              | jq '
                  (.config.size // 0)
                  + ([.layers[]?.size // 0] | add // 0)
                ')
            mb=$(( total / 1024 / 1024 ))
            echo "Compressed size for $arch: ${mb} MB (${total} bytes)"
            if [ "$total" -ge 2147483648 ]; then
              echo "FAIL: $arch compressed size ${mb} MB >= 2048 MB limit"
              exit 1
            fi
          done <<< "$digests"
          echo "OK all arch sizes under 2 GB"
